<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cockpit Matinal · FIMAVI</title>
<style>
  :root{
    color-scheme: light;
    --bg:#f1f1f8; --card:#ffffff; --ink:#16152e; --muted:#6b6a82; --faint:#9b9ab2;
    --line:#eae9f4; --navy:#16152e; --violet:#6a5cf0; --violet-d:#4e3fd0; --violet-soft:#efecfe;
    --pink:#e11d54; --amber:#c46a00; --blue:#2563eb; --slate:#64748b; --green:#1f9d57; --teams:#5b5fc7;
    --grad:linear-gradient(135deg,#6a5cf0 0%,#9a8cf6 100%);
    --shadow:0 1px 2px rgba(22,21,46,.05),0 10px 28px rgba(22,21,46,.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:radial-gradient(1200px 400px at 50% -120px,#e9e7fb 0%,var(--bg) 70%);min-height:100vh;
    color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:760px;margin:0 auto;padding:22px 16px 52px;}
  a{color:var(--violet-d);text-decoration:none;} a:hover{text-decoration:underline;}

  /* Hero */
  .hero{background:var(--card);border:1px solid var(--line);border-radius:20px;
    padding:18px 20px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
  .hero::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:var(--grad);}
  .hero::after{content:"";position:absolute;top:-40px;right:-40px;width:150px;height:150px;
    background:radial-gradient(circle at 30% 30%,rgba(106,92,240,.16),transparent 60%);pointer-events:none;}
  .hero-top{display:flex;align-items:center;gap:14px;}
  .logo{height:30px;width:auto;display:block;}
  .refresh{margin-left:auto;background:var(--grad);color:#fff;border:0;border-radius:999px;
    width:38px;height:38px;font-size:15px;cursor:pointer;box-shadow:0 4px 12px rgba(106,92,240,.35);}
  .refresh:hover{filter:brightness(1.05);} .refresh:disabled{opacity:.6;cursor:default;}
  .hero-sub{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-top:14px;flex-wrap:wrap;}
  .kicker{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--violet-d);font-weight:750;}
  .hero h1{margin:1px 0 0;font-size:21px;font-weight:800;letter-spacing:-.025em;color:var(--navy);}
  .sync{font-size:11.5px;color:var(--faint);}

  .digest{margin-top:14px;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--violet);
    border-radius:13px;padding:13px 16px;box-shadow:var(--shadow);}
  .digest .dhead{font-size:15px;font-weight:740;color:var(--navy);letter-spacing:-.01em;line-height:1.45;}
  .digest .dstats{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px;}
  .digest .stat{font-size:12px;font-weight:680;border-radius:999px;padding:4px 11px;background:#f5f4fc;color:var(--navy);border:1px solid var(--line);}
  .digest .stat b{font-weight:830;}
  .digest .stat.s-ech{background:#fdeede;color:var(--amber);border-color:#f6dcb8;}
  .digest .stat.s-rel{background:#e8effe;color:var(--blue);border-color:#cfe0fb;}

  /* Tabs */
  .tabs{display:flex;gap:7px;margin:16px 0 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
  .tab{flex:0 0 auto;border:1px solid var(--line);background:var(--card);border-radius:999px;
    padding:8px 15px;font-size:13px;font-weight:680;color:var(--muted);cursor:pointer;
    display:inline-flex;align-items:center;gap:7px;white-space:nowrap;font-family:inherit;transition:.12s;}
  .tab:hover{border-color:#d9d7ee;}
  .tab .badge{font-size:11px;font-weight:780;background:var(--violet-soft);color:var(--violet-d);
    border-radius:999px;padding:1px 7px;min-width:18px;text-align:center;}
  .tab[aria-selected="true"]{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 4px 13px rgba(106,92,240,.32);}
  .tab[aria-selected="true"] .badge{background:rgba(255,255,255,.24);color:#fff;}
  .tab.warn[aria-selected="false"] .badge{background:#fbe0e8;color:var(--pink);}

  .panel{display:none;} .panel.active{display:block;animation:fade .18s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

  /* Action card */
  .act{display:flex;gap:13px;align-items:flex-start;background:var(--card);border:1px solid var(--line);
    border-left:4px solid var(--slate);border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);transition:.12s;}
  .act:hover{transform:translateY(-1px);box-shadow:0 2px 4px rgba(22,21,46,.06),0 14px 32px rgba(22,21,46,.1);}
  .act.c-echeance{border-left-color:var(--amber);} .act.c-urgence{border-left-color:var(--pink);}
  .act.c-relance{border-left-color:var(--blue);} .act.c-a_traiter{border-left-color:var(--violet);}
  .act.c-oubli{border-left-color:var(--slate);}
  .act .ico{font-size:17px;line-height:1.3;flex:none;}
  .act .b{flex:1;min-width:0;}
  .act .title{font-size:15px;font-weight:740;letter-spacing:-.01em;line-height:1.35;color:var(--navy);}
  .act .meta{font-size:12px;color:var(--muted);margin-top:3px;}
  .act .why{font-size:12px;color:#5a5a6e;margin-top:5px;}
  .act .go{font-size:12px;font-weight:750;white-space:nowrap;align-self:center;color:var(--violet-d);}
  .tag{font-size:10px;font-weight:780;text-transform:uppercase;letter-spacing:.04em;border-radius:6px;padding:2px 7px;margin-left:7px;vertical-align:middle;}
  .tg-echeance{background:#fde8ce;color:var(--amber);} .tg-urgence{background:#fbe0e8;color:var(--pink);}
  .tg-relance{background:#e3ecff;color:var(--blue);} .tg-a_traiter{background:var(--violet-soft);color:var(--violet-d);}
  .tg-oubli{background:#eef0f3;color:var(--slate);}

  /* CR */
  .crcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:11px;box-shadow:var(--shadow);}
  .crcard.late{border-left:4px solid var(--pink);}
  .crtop{display:flex;justify-content:space-between;gap:10px;align-items:baseline;}
  .crtitle{font-weight:760;font-size:14px;color:var(--navy);}
  .crdate{font-size:11.5px;color:var(--faint);white-space:nowrap;}
  .latebadge{font-size:10px;font-weight:750;color:#fff;background:var(--pink);border-radius:999px;padding:1px 8px;margin-left:6px;}
  .task{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-top:1px dashed var(--line);}
  .task:first-of-type{border-top:1px solid var(--line);margin-top:9px;}
  .task input{margin-top:2px;width:17px;height:17px;accent-color:var(--violet);flex:none;cursor:pointer;}
  .task .tlabel{font-size:13.5px;} .task.done .tlabel{text-decoration:line-through;color:var(--faint);}
  .owntag{font-size:10px;font-weight:750;border-radius:5px;padding:1px 6px;margin-left:6px;white-space:nowrap;}
  .o-mine{background:var(--violet-soft);color:var(--violet-d);} .o-unassigned{background:#fff3e0;color:var(--amber);} .o-deleg{background:#e8f0fe;color:var(--blue);}
  .crfoot{margin-top:10px;display:flex;gap:12px;align-items:center;font-size:11.5px;color:var(--faint);flex-wrap:wrap;}
  details{margin-top:8px;} summary{font-size:11.5px;color:var(--muted);cursor:pointer;}
  .vigil{font-size:12px;color:#5a5a6e;margin:6px 0 0;padding-left:18px;} .vigil li{margin:3px 0;}

  /* Agenda */
  .dayhdr{font-size:11px;font-weight:780;text-transform:uppercase;letter-spacing:.08em;color:var(--violet-d);margin:15px 0 7px;}
  .dayhdr:first-child{margin-top:0;}
  .agitem{display:flex;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 14px;margin-bottom:6px;box-shadow:var(--shadow);}
  .agtime{font-weight:780;font-size:12.5px;color:var(--violet-d);white-space:nowrap;min-width:48px;}
  .agsubj{font-size:13.5px;font-weight:620;color:var(--navy);} .agloc{font-size:11.5px;color:var(--muted);}

  .infocard{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--teams);border-radius:12px;padding:10px 14px;margin-bottom:7px;box-shadow:var(--shadow);}
  .infocard .who{font-weight:720;font-size:12.5px;color:var(--navy);} .infocard .snip{font-size:12.5px;color:#5a5a6e;margin-top:2px;}

  .empty{background:var(--card);border:1px dashed var(--line);border-radius:14px;padding:24px;text-align:center;color:var(--muted);font-size:13.5px;}
  .empty .big{font-size:28px;display:block;margin-bottom:6px;}
  .notebar{background:#fff8e8;border:1px solid #f3e2b8;border-radius:12px;padding:9px 13px;margin-top:12px;font-size:12px;color:#7a5b00;}
  .toast{background:#eef6f0;border:1px solid #bfe3cd;border-radius:12px;padding:9px 13px;margin-top:12px;font-size:12.5px;color:#0f6b3c;display:none;}
  .subtle{font-size:12px;color:var(--faint);margin:10px 2px 0;}
  footer{margin-top:26px;text-align:center;font-size:11px;color:var(--faint);}
</style>
</head>

const store = { get(k,def){ try{ const v=localStorage.getItem(k); return v==null?def:JSON.parse(v);}catch(e){return def;} },
  set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} } };

const CAT={ urgence:{ic:"🔴",label:"Urgence",w:5}, echeance:{ic:"🟠",label:"Échéance",w:4},
  relance:{ic:"🔵",label:"Relance",w:3}, a_traiter:{ic:"🟣",label:"À traiter",w:2}, oubli:{ic:"⚪",label:"Oubli",w:1} };
const ROLE={ mine:{cls:"o-mine",label:"pour toi"}, unassigned:{cls:"o-unassigned",label:"non attribuée"}, deleg:{cls:"o-deleg",label:"à déléguer"} };
function score(e){ return (CAT[e.cat]?CAT[e.cat].w:0)*10+(e.prio||1); }

function render(){
  const d=DATA||{};
  $("syncLabel").textContent="Données du "+(d.generatedLabel||"—")+" · "+(d.mailbox||"—");
  $("briefText").textContent=d.brief||"";
  if(d.mailboxIsBot){ const nb=$("noteBar"); nb.style.display="block";
    nb.innerHTML="<b>Note :</b> boîte connectée <b>"+esc(d.mailbox||"")+"</b> (compte de service). Connecte ta boîte perso pour un briefing complet."; }

  const done=store.get("crDone",{});
  const pr=(d.priority||[]).slice().sort((a,b)=>score(b)-score(a));
  const meetings=d.crMeetings||[];
  let crPend=0; meetings.forEach(m=>(m.myTasks||[]).forEach(t=>{ if(!done[t.id]) crPend++; }));
  const evs=(d.agenda||{}).events||[];
  const hi=((d.teams||{}).highlights)||[]; const noise=d.noise||[];

  $("bTodo").textContent=pr.length; $("bMeet").textContent=crPend;
  $("bWeek").textContent=evs.length; $("bInfo").textContent=hi.length+noise.length;
  const urgent=pr.some(e=>e.cat==="echeance"||e.cat==="urgence");
  $("tabs").querySelector('[data-tab="todo"]').classList.toggle("warn",urgent);
  renderDigest(pr,crPend,evs.length);

  renderTodo(pr); renderMeet(meetings,done); renderWeek(d.agenda||{}); renderInfo(d.teams||{},noise);
}

function renderDigest(pr,crPend,nRdv){
  const urg=pr.filter(e=>e.cat==="urgence").length, ech=pr.filter(e=>e.cat==="echeance").length;
  const rel=pr.filter(e=>e.cat==="relance").length, tra=pr.filter(e=>e.cat==="a_traiter"||e.cat==="oubli").length;
  const s=[];
  if(urg) s.push('<span class="stat s-ech"><b>'+urg+'</b> urgence'+(urg>1?'s':'')+'</span>');
  if(ech) s.push('<span class="stat s-ech"><b>'+ech+'</b> échéance'+(ech>1?'s':'')+'</span>');
  if(rel) s.push('<span class="stat s-rel"><b>'+rel+'</b> relance'+(rel>1?'s':'')+'</span>');
  if(tra) s.push('<span class="stat"><b>'+tra+'</b> à traiter</span>');
  if(crPend) s.push('<span class="stat"><b>'+crPend+'</b> tâches réunion</span>');
  if(nRdv) s.push('<span class="stat"><b>'+nRdv+'</b> RDV cette semaine</span>');
  $("digestStats").innerHTML=s.join("");
}
function renderTodo(pr){
  const box=$("p-todo");
  if(!pr.length){ box.innerHTML='<div class="empty"><span class="big">🎉</span>Rien à traiter. Boîte sous contrôle — bonne journée.</div>'; return; }
  box.innerHTML=pr.map(e=>{
    const c=CAT[e.cat]||CAT.a_traiter;
    const go=e.webLink?'<a class="go" href="'+esc(e.webLink)+'" target="_blank" rel="noopener">Ouvrir ↗</a>':"";
    const meta=[e.sender,e.time].filter(Boolean).map(esc).join(" · ");
    return '<div class="act c-'+e.cat+'"><div class="ico">'+c.ic+'</div><div class="b">'+
      '<div class="title">'+esc(e.action||e.subject)+'<span class="tag tg-'+e.cat+'">'+c.label+'</span></div>'+
      (meta?'<div class="meta">'+meta+(e.attachments?' · 📎':'')+'</div>':'')+
      (e.why?'<div class="why">'+esc(e.why)+'</div>':'')+
      '</div>'+go+'</div>';
  }).join("");
}

function renderMeet(meetings,done){
  const box=$("p-meet"); let shown=0,html="";
  meetings.forEach(m=>{
    const mine=m.myTasks||[],others=m.otherTasks||[]; if(!mine.length&&!others.length) return; shown++;
    const pendMine=mine.filter(t=>!done[t.id]).length; const late=m.late&&pendMine>0;
    html+='<div class="crcard'+(late?" late":"")+'"><div class="crtop"><span class="crtitle">'+esc(m.title)+
      (late?'<span class="latebadge">EN RETARD</span>':'')+'</span><span class="crdate">'+esc(m.date||"")+'</span></div>';
    mine.forEach(t=>{ const ck=!!done[t.id]; const rm=ROLE[t.role]||ROLE.mine;
      html+='<label class="task'+(ck?" done":"")+'"><input type="checkbox" data-id="'+esc(t.id)+'"'+(ck?" checked":"")+'>'+
      '<span><span class="tlabel">'+esc(t.label)+'</span><span class="owntag '+rm.cls+'">'+rm.label+'</span>'+
      (t.assignee?'<div class="meta">Resp. : '+esc(t.assignee)+'</div>':'')+'</span></label>'; });
    if(!mine.length) html+='<div class="subtle">Aucune action ne te revient directement.</div>';
    html+='<div class="crfoot">'+(m.webLink?'<a href="'+esc(m.webLink)+'" target="_blank" rel="noopener">Voir le CR ↗</a>':'')+
      '<span>'+mine.length+' pour toi · '+others.length+' autres</span></div>';
    if(others.length) html+='<details><summary>Voir les '+others.length+' action(s) déléguées</summary><ul class="vigil">'+
      others.map(a=>'<li>'+esc(a.label)+(a.assignee?' — <i>'+esc(a.assignee)+'</i>':'')+'</li>').join("")+'</ul></details>';
    if(m.vigil&&m.vigil.length) html+='<details><summary>⚠️ '+m.vigil.length+' point(s) de vigilance</summary><ul class="vigil">'+
      m.vigil.map(v=>'<li>'+esc(v)+'</li>').join("")+'</ul></details>';
    html+='</div>';
  });
  box.innerHTML=shown?html:'<div class="empty"><span class="big">📋</span>Aucune tâche de réunion en attente.</div>';
  box.querySelectorAll('input[type=checkbox]').forEach(cb=>cb.addEventListener("change",()=>{
    const dd=store.get("crDone",{}); if(cb.checked) dd[cb.dataset.id]=1; else delete dd[cb.dataset.id]; store.set("crDone",dd);
    render(); show("meet");
  }));
}

function renderWeek(ag){
  const box=$("p-week");
  if(!ag.available){ box.innerHTML='<div class="empty">'+esc(ag.note||"Agenda non disponible.")+'</div>'; return; }
  const evs=ag.events||[]; if(!evs.length){ box.innerHTML='<div class="empty"><span class="big">🗓️</span>Aucun rendez-vous.</div>'; return; }
  let html=ag.note?'<div class="subtle" style="margin-top:0">📍 '+esc(ag.note)+'</div>':""; let day=null;
  evs.forEach(e=>{ const parts=(e.time||"").split(" "); const d=parts.length>1?parts[0]:""; const h=parts.length>1?parts.slice(1).join(" "):e.time;
    if(d!==day){ day=d; if(d) html+='<div class="dayhdr">'+esc(d)+'</div>'; }
    html+='<div class="agitem"><span class="agtime">'+esc(h||"—")+'</span><span><span class="agsubj">'+esc(e.subject||"")+'</span>'+
      (e.location?'<div class="agloc">📍 '+esc(e.location)+'</div>':'')+'</span></div>'; });
  box.innerHTML=html;
}

function renderInfo(tm,noise){
  const box=$("p-info"); const hi=(tm&&tm.highlights)||[]; let html="";
  if(hi.length){ html+='<div class="dayhdr" style="margin-top:0">À connaître (sans action)</div>'+
    hi.map(h=>'<div class="infocard"><div class="who">'+esc(h.from||"")+(h.context?' · '+esc(h.context):'')+(h.date?' · '+esc(h.date):'')+
    '</div><div class="snip">'+esc(h.snippet||"")+(h.webLink?' <a href="'+esc(h.webLink)+'" target="_blank" rel="noopener">↗</a>':'')+'</div></div>').join(""); }
  if(noise.length){ html+='<div class="dayhdr">Bruit écarté</div>'+
    noise.map(e=>'<div class="infocard" style="border-left-color:var(--slate)"><div class="who">'+esc(e.sender)+'</div><div class="snip">'+esc(e.subject)+'</div></div>').join(""); }
  box.innerHTML=html||'<div class="empty">Rien à signaler.</div>';
}

function show(name){ document.querySelectorAll(".panel").forEach(p=>p.classList.toggle("active",p.id==="p-"+name));
  document.querySelectorAll(".tab").forEach(t=>t.setAttribute("aria-selected", t.dataset.tab===name?"true":"false")); store.set("tab",name); }
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>show(t.dataset.tab)));

function showToast(msg,warn){ const t=$("toast"); t.style.display="block"; t.textContent=msg;
  if(warn){ t.style.background="#fff8e8"; t.style.borderColor="#f3e2b8"; t.style.color="#7a5b00"; } }
$("refreshBtn").addEventListener("click",async function(){
  const btn=this;
  if(!(window.cowork && typeof window.cowork.runScheduledTask==="function")){ showToast("Pour rafraîchir : lance la routine « Cockpit Matinal » depuis tes tâches planifiées, puis recharge.",true); return; }
  btn.disabled=true; btn.textContent="⏳";
  try{ await window.cowork.runScheduledTask(REFRESH_TASK_ID); showToast("Routine lancée — recharge ce tableau dans une minute."); }
  catch(e){ showToast("Lance la routine manuellement depuis tes tâches planifiées.",true); }
  btn.textContent="🔄"; setTimeout(()=>{ btn.disabled=false; },4000);
});

render();
show(store.get("tab","todo"));
</script>
</body>
</html>
